services:

  spring:
    image: zipte/server:latest
    container_name: zipte-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis
    networks:
      - backend-bridge

  mysql:
    image: mysql:8.0
    container_name: zipte-mysql
    volumes:
      - ./mysql/my.cnf:/etc/mysql/conf.d/mytv.cnf
      - ./mysql/data:/var/lib/mysql
    ports:
      - '3306:3306'
    environment:
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    networks:
      - backend-bridge

  redis:
    image: redis:7.2.5
    container_name: zipte-redis
    ports:
      - '6379:6379'
    networks:
      - backend-bridge

  # Nginx Proxy
  nginx: # nginx 서비스 정의
    image: nginx:latest  # 사용할 Docker 이미지
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf
      - /letsencrypt/certbot/conf:/etc/letsencrypt
      - /letsencrypt/certbot/www:/var/www/certbot
    ports:
      - 80:80
      - 443:443
    depends_on:
      - spring
    networks:
      - backend-bridge
    command: '/bin/sh -c ''while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g "daemon off;"'''

  certbot:
    container_name: certbot
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - /letsencrypt/certbot/conf:/etc/letsencrypt
      - /letsencrypt/certbot/www:/var/www/certbot
    depends_on:
      - nginx
    networks:
      - backend-bridge
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  backend-bridge:
    driver: bridge
