# separate terms of service, privacy policy, and support
# documentation.
# This workflow will build a Java project with Gradle and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-gradle

name: Java CI with Gradle

on:
  push:
    branches: [ "develop"]
  pull_request:
    branches: [ "develop"]

jobs:
  #1. Test 용
  test:

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # 1-1. repository checkout
      - uses: actions/checkout@v4

      # 1-2. jdk 환경 설치
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1-3. '*.yml' 파일 세팅
      - name: application.yml 파일 설정
        run: |
          mkdir -p src/main/resources
          echo "${{ secrets.APPLICATION_YML }}" > ./src/main/resources/application.yml

      - name: application-dev.yml 설정
        run: echo "${{ secrets.APPLICATION_DEV_YML }}" > ./src/main/resources/application-dev.yml

      - name: application-oauth2.yml 설정
        run: echo "${{ secrets.APPLICATION_OAUTH2_YML }}" > ./src/main/resources/application-oauth2.yml


      # 1-4. gradle 환경 설치
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      # 1-5. 빌드
      - name: Build with Gradle Wrapper
        run: ./gradlew build
          
          ## 테스트 커버리지
      - name: Test Coverage Report
        id: jacoco
        uses: madrapps/jacoco-report@v1.2
        with:
          title: Test Coverage Report
          paths: ${{ github.workspace }}/build/jacoco/index.xml
          token: ${{ secrets.TOKEN }}
          min-coverage-changed-files: 0
          min-coverage-overall: 0
          debug-mode: true

      - name: Test 결과 출력
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          junit_files: '**/build/test-results/test/TEST-*.xml'
          github_token: ${{ secrets.TOKEN }}

